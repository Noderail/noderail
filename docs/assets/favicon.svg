<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background -->
  <rect width="100" height="100" fill="#13151a" rx="12"/>

  <!-- Horizontal rail line -->
  <line x1="18" y1="65" x2="82" y2="65" stroke="#e8e4dc" stroke-width="3" stroke-linecap="round"/>

  <!-- Tick marks on rail -->
  <line x1="38" y1="61" x2="38" y2="69" stroke="#e8e4dc" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="56" y1="61" x2="56" y2="69" stroke="#e8e4dc" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Center vertical stem -->
  <line x1="47" y1="65" x2="47" y2="36" stroke="#e8e4dc" stroke-width="3" stroke-linecap="round"/>

  <!-- Left branch -->
  <line x1="47" y1="65" x2="22" y2="52" stroke="#e8e4dc" stroke-width="3" stroke-linecap="round"/>

  <!-- Right branch -->
  <line x1="47" y1="65" x2="72" y2="52" stroke="#e8e4dc" stroke-width="3" stroke-linecap="round"/>

  <!-- Left node dot -->
  <circle cx="21" cy="51" r="4" fill="#e8e4dc"/>

  <!-- Right node dot -->
  <circle cx="73" cy="51" r="4" fill="#e8e4dc"/>

  <!-- Top teal dot -->
  <circle cx="47" cy="33" r="7" fill="#3ecfcf"/>
</svg>
